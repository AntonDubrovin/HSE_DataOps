services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  airflow.db.init:
    image: apache/airflow:2.10.4
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
    command: db init
    depends_on:
      db:
        condition: service_healthy

  airflow.db.migrate:
    image: apache/airflow:2.10.4
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
    command: db migrate
    depends_on:
      airflow.db.init:
        condition: service_completed_successfully

  airflow.webserver:
    image: apache/airflow:2.10.4
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow.db.migrate:
        condition: service_completed_successfully

  airflow.scheduler:
    image: apache/airflow:2.10.4
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
    command: scheduler
    depends_on:
      airflow.db.migrate:
        condition: service_completed_successfully

  airflow.triggerer:
    image: apache/airflow:2.10.4
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
    command: triggerer
    depends_on:
      airflow.db.migrate:
        condition: service_completed_successfully
